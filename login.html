<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - DailyGarden</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
    body { background: #fdfbf7; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    
    /* AUTH OVERLAY CSS */
    
    
    /* Standalone overrides */
    .auth-screen { position: relative; background: transparent; backdrop-filter: none; z-index: 1; align-items: center; }
    .auth-box { box-shadow: 0 20px 40px rgba(0,0,0,0.08); width: 450px; max-width: 90vw; }
    #loginVideoContainer { z-index: 100; }
  </style>
</head>
<body>

  <div class="auth-screen " id="authScreen">
    <div class="auth-box">
      <button onclick="closeAuthScreen()" id="authCloseBtn"
        style="position:absolute;top:1rem;right:1rem;background:rgba(122,158,126,.15);border:none;cursor:pointer;width:32px;height:32px;border-radius:50%;font-size:1rem;display:flex;align-items:center;justify-content:center;color:var(--moss);transition:all .2s;z-index:10">✕</button>
      <div class="auth-logo">
        <span class="auth-logo-icon">🌱</span>
        <span class="auth-logo-text">DailyGarden</span>
      </div>
      <div class="auth-tagline">Your personal digital gardening journal</div>

      <div class="auth-tab-row">
        <button class="auth-tab active" id="tabLogin" onclick="switchAuthTab('login')">Sign In</button>
        <button class="auth-tab" id="tabRegister" onclick="switchAuthTab('register')">Create Account</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="loginForm">
        <div class="auth-form">
          <div class="auth-input-group">
            <span class="auth-input-icon">📧</span>
            <input class="auth-input" type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email">
          </div>
          <div class="auth-input-group">
            <span class="auth-input-icon">🔒</span>
            <input class="auth-input" type="password" id="loginPassword" placeholder="Password"
              autocomplete="current-password">
          </div>
          <div class="auth-error" id="loginError"></div>
          <button class="auth-btn-primary" onclick="doLogin()">Sign In →</button>
        </div>
        <div class="auth-divider">or</div>
        <button class="auth-google-btn" onclick="doGoogleAuth()">
          <div class="google-icon"></div>
          Continue with Google
        </button>
        <div class="auth-footer-text">New here? Switch to <b style="cursor:pointer;color:var(--forest)"
            onclick="switchAuthTab('register')">Create Account</b> to register.</div>
      </div>

      <!-- REGISTER FORM -->
      <div id="registerForm" style="display:none">
        <div class="auth-form">
          <div class="auth-input-group">
            <span class="auth-input-icon">🧑‍🌾</span>
            <input class="auth-input" type="text" id="regName" placeholder="Your full name" autocomplete="name">
          </div>
          <div class="auth-input-group">
            <span class="auth-input-icon">📧</span>
            <input class="auth-input" type="email" id="regEmail" placeholder="your@email.com" autocomplete="email">
          </div>
          <div class="auth-input-group">
            <span class="auth-input-icon">🔒</span>
            <input class="auth-input" type="password" id="regPassword" placeholder="Create a password (min 6 chars)"
              autocomplete="new-password">
          </div>
          <div class="auth-input-group">
            <span class="auth-input-icon">📍</span>
            <input class="auth-input" type="text" id="regCity" placeholder="City (e.g. Bengaluru)" autocomplete="off">
          </div>
          <div class="auth-error" id="registerError"></div>
          <button class="auth-btn-primary" onclick="doRegister()">Create Account 🌱</button>
        </div>
        <div class="auth-divider">or</div>
        <button class="auth-google-btn" onclick="doGoogleAuth()">
          <div class="google-icon"></div>
          Continue with Google
        </button>
      </div>
    </div>
  </div>

  <div id="loginVideoContainer" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:#000; z-index:9999; flex-direction:column; justify-content:center; align-items:center;">
    <video id="loginVideo" src="https://videos.pexels.com/video-files/5267439/5267439-hd_1920_1080_30fps.mp4" playsinline style="width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity 1s ease-in-out;"></video>
    <div id="loadingText" style="position:absolute; bottom:15%; color:#fff; font-family:'Outfit',sans-serif; font-size:1.5rem; letter-spacing:3px; opacity:0; transition:opacity 1s ease-in-out; font-weight:300;">GROWING YOUR GARDEN...</div>
  </div>

  <script>
    function switchAuthTab(tab) {
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    }

    function showAuthError(msg) {
      const err = document.getElementById('authError');
      err.textContent = msg; err.style.display = 'block';
    }

    function playLoginVideo() {
      const vc = document.getElementById('loginVideoContainer');
      const v = document.getElementById('loginVideo');
      const txt = document.getElementById('loadingText');
      vc.style.display = 'flex';
      setTimeout(() => {
        v.style.opacity = '0.6'; txt.style.opacity = '1';
        v.play().catch(e => console.log('Autoplay prevented', e));
      }, 50);
      setTimeout(() => { window.location.href = '/'; }, 3500);
    }

    document.getElementById('googleLoginBtn').onclick = () => window.location.href = '/auth/google';
    document.getElementById('googleRegBtn').onclick = () => window.location.href = '/auth/google';

    async function doLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      if (!email) return showAuthError('Please enter an email.');
      let users = JSON.parse(localStorage.getItem('gardenlog_users') || '{}');
      if (!users[email]) return showAuthError('Account not found.');
      sessionStorage.setItem('gardenlog_session', JSON.stringify(users[email]));
      try {
        await fetch('/api/sync-session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: users[email].email, name: users[email].name })
        });
      } catch (e) {}
      playLoginVideo();
    }

    async function doRegister() {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      if (!name || !email) return showAuthError('Name and email are required.');
      let users = JSON.parse(localStorage.getItem('gardenlog_users') || '{}');
      if (users[email]) return showAuthError('Account already exists.');
      const newUser = {
        name, email,
        avatar: 'https://api.dicebear.com/7.x/bottts/svg?seed=' + name,
        joinDate: new Date().toLocaleDateString('en-IN', { month: 'short', year: 'numeric' }),
        city: 'India', plants: [], harvestLog: [], wateringHistory: []
      };
      users[email] = newUser;
      localStorage.setItem('gardenlog_users', JSON.stringify(users));
      sessionStorage.setItem('gardenlog_session', JSON.stringify(newUser));
      try {
        await fetch('/api/sync-session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, name: name })
        });
      } catch (e) {}
      playLoginVideo();
    }
  </script>
</body>
</html>
